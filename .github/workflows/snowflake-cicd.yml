name: Snowflake Healthcare CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'SNOWFLAKE SQL/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ACCOUNTADMIN
  SNOWFLAKE_WAREHOUSE: COMPUTE_WH

jobs:
  validate:
    name: Validate SQL Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install snowflake-connector-python sqlfluff

      - name: Lint SQL Files
        run: |
          sqlfluff lint "SNOWFLAKE SQL/" --dialect snowflake || true

      - name: Validate SQL Syntax
        run: |
          python scripts/validate_sql.py

  deploy-dev:
    name: Deploy to Development
    needs: validate
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snowflake Connector
        run: pip install snowflake-connector-python

      - name: Deploy Scripts
        run: python scripts/deploy.py --env dev

  deploy-prod:
    name: Deploy to Production
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snowflake Connector
        run: pip install snowflake-connector-python

      - name: Deploy Account Setup
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/account_admin/account_setup.sql"

      - name: Deploy Warehouses
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/warehouses/warehouse_setup.sql"

      - name: Deploy Databases
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/databases/database_setup.sql"

      - name: Deploy RBAC
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/rbac/rbac_roles.sql"

      - name: Deploy Governance
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/governance/masking_policies.sql"

      - name: Deploy Medallion Layer
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/medallion/bronze_layer.sql"

      - name: Deploy AI Ready Layer
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/ai_ready/ai_feature_views.sql"

      - name: Deploy Monitoring
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/monitoring/monitoring_queries.sql"

      - name: Deploy Alerts
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/ai_ready/alerts/alert_tasks.sql"

      - name: Deploy Audit Layer
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/audit/audit_queries.sql"

      - name: Run Validation Checks
        run: python scripts/deploy.py --script "SNOWFLAKE SQL/verification/validation_checks.sql"
