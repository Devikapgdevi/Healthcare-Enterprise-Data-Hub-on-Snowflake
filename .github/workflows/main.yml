name: Snowflake Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
  SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
  SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install SnowSQL
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.27-linux_x86_64.bash
          SNOWSQL_DEST=~/bin SNOWSQL_LOGIN_SHELL=~/.profile bash snowsql-1.2.27-linux_x86_64.bash -b ~/bin

      - name: Validate SQL Syntax
        run: |
          echo "Validating SQL files..."
          for file in $(find sql -name "*.sql" | sort); do
            echo "Checking $file"
            if ! head -1 "$file" > /dev/null 2>&1; then
              echo "Error: Cannot read $file"
              exit 1
            fi
          done
          echo "All SQL files validated"

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install SnowSQL
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.27-linux_x86_64.bash
          SNOWSQL_DEST=~/bin SNOWSQL_LOGIN_SHELL=~/.profile bash snowsql-1.2.27-linux_x86_64.bash -b ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure SnowSQL
        run: |
          mkdir -p ~/.snowsql
          cat > ~/.snowsql/config << EOF
          [connections]
          accountname = $SNOWFLAKE_ACCOUNT
          username = $SNOWFLAKE_USER
          password = $SNOWFLAKE_PASSWORD
          rolename = $SNOWFLAKE_ROLE
          warehousename = $SNOWFLAKE_WAREHOUSE
          dbname = $SNOWFLAKE_DATABASE
          schemaname = $SNOWFLAKE_SCHEMA
          EOF
          chmod 700 ~/.snowsql/config

      - name: Test Snowflake Connection
        run: |
          ~/bin/snowsql -q "SELECT CURRENT_TIMESTAMP();" -o output_format=tsv -o header=false -o timing=false
          echo "Connection successful"

      - name: Execute SQL Files
        run: |
          echo "Starting Snowflake Deployment to ${{ github.ref_name }}"
          
          FAILED=0
          for file in $(find sql -name "*.sql" | sort); do
            echo "----------------------------------------"
            echo "Executing: $file"
            echo "----------------------------------------"
            
            if ~/bin/snowsql -f "$file" -o exit_on_error=true -o output_format=tsv; then
              echo "✓ $file executed successfully"
            else
              echo "✗ $file failed"
              FAILED=1
              break
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
            echo "Deployment failed!"
            exit 1
          fi
          
          echo "Deployment completed successfully"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.snowsql/config

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && github.event_name == 'push'
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to ${{ github.ref_name }} succeeded"
          else
            echo "❌ Deployment to ${{ github.ref_name }} failed"
            exit 1
          fi
