name: Healthcare Platform - Snowflake CI/CD

on:
  push:
    branches: [main, develop, 'release/*']
    paths:
      - 'Healthcare-Snowflake-Enterprise-v2/deploy/**'
      - '.github/workflows/snowflake-cicd.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'DEV'
        type: choice
        options:
          - DEV
          - QA
          - PROD
      phase:
        description: 'Specific phase (leave empty for all)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (validate only)'
        required: false
        default: false
        type: boolean

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_key.p8
  SNOWFLAKE_ROLE: ACCOUNTADMIN
  SNOWFLAKE_WAREHOUSE: COMPUTE_WH

jobs:
  # ============================================================================
  # STAGE 1: VALIDATION
  # ============================================================================
  validate:
    name: Validate SQL Scripts
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SQLFluff
        run: pip install sqlfluff snowflake-connector-python

      - name: Lint SQL Files
        id: lint
        run: |
          cd Healthcare-Snowflake-Enterprise-v2/deploy
          sqlfluff lint . --dialect snowflake --format github-annotation || true

      - name: Check for Changes
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "deploy/"; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Security Scan
        run: |
          echo "Scanning for secrets and security issues..."
          # Check for hardcoded passwords
          if grep -rn "PASSWORD\s*=" Healthcare-Snowflake-Enterprise-v2/deploy/ | grep -v "PASSWORD_"; then
            echo "::error::Potential hardcoded password detected"
            exit 1
          fi
          echo "Security scan passed"

  # ============================================================================
  # STAGE 2: DEV DEPLOYMENT
  # ============================================================================
  deploy-dev:
    name: Deploy to DEV
    needs: validate
    if: |
      needs.validate.outputs.should_deploy == 'true' && 
      (github.ref == 'refs/heads/develop' || 
       github.event.inputs.environment == 'DEV')
    runs-on: ubuntu-latest
    environment: development
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Snowflake CLI
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.28-linux_x86_64.bash
          bash snowsql-1.2.28-linux_x86_64.bash

      - name: Configure Credentials
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > $SNOWFLAKE_PRIVATE_KEY_PATH
          chmod 600 $SNOWFLAKE_PRIVATE_KEY_PATH

      - name: Deploy to DEV
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          cd Healthcare-Snowflake-Enterprise-v2
          chmod +x deploy.sh
          ./deploy.sh --env DEV ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Run Smoke Tests
        run: |
          snowsql -q "SELECT 'DEV deployment verified' AS status"

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dev-deployment-logs
          path: Healthcare-Snowflake-Enterprise-v2/logs/

  # ============================================================================
  # STAGE 3: QA DEPLOYMENT
  # ============================================================================
  deploy-qa:
    name: Deploy to QA
    needs: [validate, deploy-dev]
    if: |
      needs.validate.outputs.should_deploy == 'true' && 
      (github.ref == 'refs/heads/main' || 
       startsWith(github.ref, 'refs/heads/release/') ||
       github.event.inputs.environment == 'QA')
    runs-on: ubuntu-latest
    environment: qa
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Snowflake CLI
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.28-linux_x86_64.bash
          bash snowsql-1.2.28-linux_x86_64.bash

      - name: Configure Credentials
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > $SNOWFLAKE_PRIVATE_KEY_PATH
          chmod 600 $SNOWFLAKE_PRIVATE_KEY_PATH

      - name: Deploy to QA
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          cd Healthcare-Snowflake-Enterprise-v2
          chmod +x deploy.sh
          ./deploy.sh --env QA

      - name: Run Integration Tests
        run: |
          echo "Running integration tests..."
          snowsql -f Healthcare-Snowflake-Enterprise-v2/tests/integration_tests.sql -D ENV=QA

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-deployment-logs
          path: Healthcare-Snowflake-Enterprise-v2/logs/

  # ============================================================================
  # STAGE 4: PROD DEPLOYMENT (Requires Approval)
  # ============================================================================
  deploy-prod:
    name: Deploy to PROD
    needs: [validate, deploy-qa]
    if: |
      needs.validate.outputs.should_deploy == 'true' && 
      (github.ref == 'refs/heads/main' ||
       github.event.inputs.environment == 'PROD')
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Snowflake CLI
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.28-linux_x86_64.bash
          bash snowsql-1.2.28-linux_x86_64.bash

      - name: Configure Credentials
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY_PROD }}" > $SNOWFLAKE_PRIVATE_KEY_PATH
          chmod 600 $SNOWFLAKE_PRIVATE_KEY_PATH

      - name: Pre-deployment Backup
        run: |
          echo "Creating pre-deployment snapshot..."
          snowsql -q "
            -- Snapshot critical tables before deployment
            SELECT 'Pre-deployment backup initiated' AS status;
          "

      - name: Deploy to PROD
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          cd Healthcare-Snowflake-Enterprise-v2
          chmod +x deploy.sh
          ./deploy.sh --env PROD

      - name: Post-deployment Validation
        run: |
          echo "Running post-deployment validation..."
          snowsql -f Healthcare-Snowflake-Enterprise-v2/tests/smoke_tests.sql -D ENV=PROD

      - name: Notify Success
        if: success()
        run: |
          echo "::notice::PROD deployment completed successfully"

      - name: Notify Failure
        if: failure()
        run: |
          echo "::error::PROD deployment failed - check logs for details"

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prod-deployment-logs
          path: Healthcare-Snowflake-Enterprise-v2/logs/

  # ============================================================================
  # STAGE 5: DEPLOYMENT SUMMARY
  # ============================================================================
  summary:
    name: Deployment Summary
    needs: [deploy-dev, deploy-qa, deploy-prod]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| DEV | ${{ needs.deploy-dev.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QA | ${{ needs.deploy-qa.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PROD | ${{ needs.deploy-prod.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
