trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - 'sql/**'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: snowflake-credentials

stages:
  - stage: Validate
    jobs:
      - job: ValidateSQL
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
          
          - script: pip install sqlfluff
            displayName: 'Install SQLFluff'
          
          - script: sqlfluff lint sql/ --dialect snowflake --ignore parsing || true
            displayName: 'Lint SQL Files'

  - stage: Deploy
    dependsOn: Validate
    jobs:
      - deployment: DeployToSnowflake
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                
                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: '3.11'
                
                - script: pip install snowflake-connector-python
                  displayName: 'Install Snowflake Connector'
                
                - script: |
                    python << 'EOF'
                    import snowflake.connector
                    import os
                    from pathlib import Path

                    conn = snowflake.connector.connect(
                        account=os.environ['SNOWFLAKE_ACCOUNT'],
                        user=os.environ['SNOWFLAKE_USER'],
                        password=os.environ['SNOWFLAKE_PASSWORD'],
                        role='ACCOUNTADMIN',
                        warehouse='COMPUTE_WH'
                    )

                    sql_files = [
                        'sql/01_account_administration.sql',
                        'sql/02_rbac_setup.sql',
                        'sql/03_warehouse_management.sql',
                        'sql/04_database_structure.sql',
                        'sql/05_resource_monitors.sql',
                        'sql/06_monitoring_views.sql',
                        'sql/07_alerts.sql',
                        'sql/08_data_governance.sql',
                        'sql/09_audit_layer.sql',
                        'sql/10_verification.sql',
                        'sql/11_medallion_architecture.sql',
                        'sql/12_healthcare_industry.sql',
                        'sql/13_ai_ready_layer.sql'
                    ]

                    cursor = conn.cursor()
                    for sql_file in sql_files:
                        if Path(sql_file).exists():
                            print(f"Executing: {sql_file}")
                            sql_content = Path(sql_file).read_text()
                            for stmt in [s.strip() for s in sql_content.split(';') if s.strip()]:
                                if stmt and not stmt.startswith('--'):
                                    try:
                                        cursor.execute(stmt)
                                    except Exception as e:
                                        print(f"Warning: {str(e)[:100]}")

                    conn.close()
                    print("Deployment complete!")
                    EOF
                  displayName: 'Deploy to Snowflake'
                  env:
                    SNOWFLAKE_ACCOUNT: $(SNOWFLAKE_ACCOUNT)
                    SNOWFLAKE_USER: $(SNOWFLAKE_USER)
                    SNOWFLAKE_PASSWORD: $(SNOWFLAKE_PASSWORD)
